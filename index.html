<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Dial calibrator</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />

        <style>
            /* IFL Watches brand palette */
            :root {
                --space: #081820;
                --peacock: #01416f;
                --tiffany: #40bec1;
                --tangerine: #fb6130;
                --vanilla: #f9f4e4;
                --accent: #40bec1; /* per-tool: tiffany or tangerine */
                --r: 3px;
            }

            .staticrypt-html { height: 100%; }

            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                height: 100%;
                margin: 0;
                background:
                    radial-gradient(120% 80% at 50% -10%, #0d2531 0%, var(--space) 60%);
                font-family: "Montserrat", "Arial", sans-serif;
                color: var(--vanilla);
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-page {
                min-height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                box-sizing: border-box;
                padding: 24px;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                width: 100%;
                max-width: 380px;
                text-align: center;
            }

            /* wordmark logo (replaces the "IFL Watches" text title) */
            .iflw-wm {
                margin: 0 auto 30px;
                width: 210px;
                max-width: 70%;
            }
            .iflw-wm svg { display: block; width: 100%; height: auto; }

            .staticrypt-instructions {
                margin: 0 0 26px;
            }
            .staticrypt-title {
                font-size: 12px;
                letter-spacing: 0.28em;
                text-transform: uppercase;
                font-weight: 600;
                color: var(--accent);
                margin: 0 0 8px;
            }
            .staticrypt-instructions p:last-child {
                font-size: 13px;
                line-height: 1.5;
                color: rgba(249, 244, 228, 0.6);
                margin: 0;
            }

            .staticrypt-password-container {
                position: relative;
                outline: 0;
                background: rgba(249, 244, 228, 0.06);
                border: 1px solid rgba(249, 244, 228, 0.18);
                border-radius: var(--r);
                width: 100%;
                margin: 0 0 14px;
                box-sizing: border-box;
                transition: border-color 0.15s ease;
            }
            .staticrypt-password-container:focus-within {
                border-color: var(--accent);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                box-sizing: border-box;
                font-family: inherit;
                font-size: 15px;
                color: var(--vanilla);
                outline: 0;
                padding: 15px 44px 15px 16px;
                width: 100%;
                letter-spacing: 0.02em;
            }
            .staticrypt-form input::placeholder { color: rgba(249, 244, 228, 0.4); }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                opacity: 0.55;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
                filter: invert(96%) sepia(8%) saturate(400%) hue-rotate(0deg) brightness(105%);
            }

            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: uppercase;
                letter-spacing: 0.14em;
                font-family: inherit;
                font-weight: 700;
                outline: 0;
                background: var(--accent);
                width: 100%;
                border: 0;
                border-radius: var(--r);
                padding: 15px;
                color: var(--space);
                font-size: 13px;
                cursor: pointer;
                transition: filter 0.15s ease;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                filter: brightness(108%);
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 18px 0 0;
                font-size: 12px;
                color: rgba(249, 244, 228, 0.55);
            }
            .staticrypt-remember input[type="checkbox"] {
                accent-color: var(--accent);
                transform: scale(1.3);
                margin-right: 0.8em;
            }

            .hidden { display: none !important; }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--space);
            }
            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.25em solid rgba(249, 244, 228, 0.25);
                border-right-color: var(--accent);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }
            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>

    <body class="staticrypt-body">
